version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
#  BuddBull — Local development docker-compose
#
#  Services:
#    api       — Node.js Express backend (hot-reload via nodemon)
#    mongo     — MongoDB 6 with volume persistence
#    mongo-ui  — Mongo Express admin UI at http://localhost:8081
#    redis     — (optional) Redis for session caching / rate-limit store
#
#  Usage:
#    docker compose up -d          # start all services
#    docker compose logs -f api    # tail API logs
#    docker compose down -v        # stop and remove volumes
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:6.0
    container_name: buddbull_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-secret}
      MONGO_INITDB_DATABASE: buddbull
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mongo Express (dev DB browser) ────────────────────────────────────────
  mongo-ui:
    image: mongo-express:1.0.2-20
    container_name: buddbull_mongo_ui
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASS:-secret}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-secret}@mongo:27017/
      ME_CONFIG_BASICAUTH: "false"

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: buddbull_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis_data:/data

  # ── API (Node.js / Express) ────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      target: development # uses the dev stage in backend/Dockerfile
    container_name: buddbull_api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      # Override the MONGO_URI to point to the docker service name
      MONGO_URI: mongodb+srv://rahaimm10:rahaim1020@buddbull.ak1g7uh.mongodb.net/?appName=BuddBull
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    volumes:
      # Hot-reload: mount source code
      - ./backend:/app
      # Prevent overwriting node_modules inside the container
      - /app/node_modules
      # Persist uploads between restarts
      - uploads_data:/app/uploads
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:5000/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  mongo_data:
  redis_data:
  uploads_data:


networks:
  default:
    name: buddbull_network
