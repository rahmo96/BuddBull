# ─────────────────────────────────────────────────────────────────────────────
#  BuddBull — Local development docker-compose
#
#  Services:
#    api       — Node.js Express backend (hot-reload via nodemon)
#    redis     — (optional) Redis for session caching / rate-limit store
#
#  Usage:
#    docker compose up -d          # start all services
#    docker compose logs -f api    # tail API logs
#    docker compose down -v        # stop and remove volumes
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: buddbull_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis_data:/data

  # ── API (Node.js / Express) ────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      target: development # uses the dev stage in backend/Dockerfile
    container_name: buddbull_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    volumes:
      # Hot-reload: mount source code
      - ./backend:/app
      # Prevent overwriting node_modules inside the container
      - /app/node_modules
      # Persist uploads between restarts
      - uploads_data:/app/uploads
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  redis_data:
  uploads_data:

networks:
  default:
    name: buddbull_network
