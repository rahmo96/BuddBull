name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: Lint + Test ───────────────────────────────────────────────────
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      # in-memory MongoDB is handled by mongodb-memory-server inside Jest,
      # but we spin up a real instance for potential integration smoke tests
      mongo:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          MONGOMS_VERSION: '6.0.12'
          JWT_ACCESS_SECRET: ci_test_access_secret_at_least_32_chars
          JWT_REFRESH_SECRET: ci_test_refresh_secret_at_least_32_chars
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          BCRYPT_SALT_ROUNDS: 1
          EMAIL_HOST: smtp.ethereal.email
          EMAIL_PORT: 587
          EMAIL_USER: test@ethereal.email
          EMAIL_PASS: testpass
          EMAIL_FROM: test@buddbull.app
          CLIENT_URL: http://localhost:3000
          UPLOAD_DRIVER: local
          UPLOAD_DIR: uploads/
          RATE_LIMIT_WINDOW_MS: 900000
          RATE_LIMIT_MAX: 1000

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

  # ── Flutter: Analyze + Test ────────────────────────────────────────────────
  flutter:
    name: Flutter — Analyze & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter 3.24
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Dart analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: frontend/coverage/

  # ── Docker build smoke test ────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (production)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          target: production
          push: false
          tags: buddbull-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
