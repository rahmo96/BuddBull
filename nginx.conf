# ─────────────────────────────────────────────────────────────────────────────
#  BuddBull — Production Nginx reverse-proxy configuration
#
#  Responsibilities:
#   • Terminate HTTPS (TLS handled by Certbot / ACM)
#   • Proxy /api/v1 → Node.js container on port 5000
#   • Upgrade /socket.io connections to WebSocket
#   • Serve static uploads with long-lived cache headers
#   • Security headers (HSTS, X-Frame-Options, etc.)
# ─────────────────────────────────────────────────────────────────────────────

upstream api {
    server 127.0.0.1:5000;
    keepalive 64;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.buddbull.app;
    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.buddbull.app;

    # ── TLS (managed by Certbot — replace paths as needed) ────────
    ssl_certificate     /etc/letsencrypt/live/api.buddbull.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.buddbull.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers ───────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Request limits ─────────────────────────────────────────────
    client_max_body_size 10m;
    client_body_timeout  30s;
    client_header_timeout 15s;

    # ── Logging ────────────────────────────────────────────────────
    access_log /var/log/nginx/buddbull_access.log combined;
    error_log  /var/log/nginx/buddbull_error.log warn;

    # ── Health check (public, no auth) ────────────────────────────
    location = /health {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # ── Static uploads ─────────────────────────────────────────────
    location /uploads/ {
        alias /opt/buddbull/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
    }

    # ── Socket.io (WebSocket upgrade) ─────────────────────────────
    location /socket.io/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── API (all other routes) ─────────────────────────────────────
    location /api/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # ── 404 fallback ───────────────────────────────────────────────
    location / {
        return 404 '{"success":false,"message":"Not found"}';
        add_header Content-Type application/json;
    }
}
