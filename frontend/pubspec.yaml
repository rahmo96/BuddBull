name: buddbull
description: BuddBull — Social-Sport Platform. Connect, play, and track.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State management ──────────────────────────────────────
  flutter_riverpod: ^2.6.1

  # ── Navigation ────────────────────────────────────────────
  go_router: ^14.6.1

  # ── Networking ────────────────────────────────────────────
  dio: ^5.9.0

  # ── Secure token storage ──────────────────────────────────
  flutter_secure_storage: ^9.2.2

  # ── Local preferences ─────────────────────────────────────
  shared_preferences: ^2.3.3

  # ── UI ────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  cupertino_icons: ^1.0.8

  # ── Charts ────────────────────────────────────────────────
  fl_chart: ^0.69.0

  # ── Calendar ──────────────────────────────────────────────
  table_calendar: ^3.1.2

  # ── Real-time (Socket.io) ─────────────────────────────────
  socket_io_client: ^2.0.3+1

  # ── Firebase ───────────────────────────────────────────────
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3

  # ── Utilities ─────────────────────────────────────────────
  intl: ^0.20.2
  equatable: ^2.0.7
  logger: ^2.4.0

  # ── Extras ────────────────────────────────────────────────
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.2.0
  geolocator: ^14.0.2
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^20.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0 # השארתי את הגרסה הזו (ניתן לשנות ל-5.0.0 אם תרצה)
  flutter_launcher_icons: ^0.14.4
  firebase_auth_mocks: ^0.15.1
  firebase_core_platform_interface: ^6.0.3
  mocktail: ^1.0.4
  mock_exceptions: any

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/logo.png
    - assets/icons/
    - assets/lottie/
    - assets/avatars/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
  adaptive_icon_background: "#14B8A6"
  adaptive_icon_foreground: assets/images/logo.png