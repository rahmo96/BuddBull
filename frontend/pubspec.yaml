name: buddbull
description: BuddBull — Social-Sport Platform. Connect, play, and track.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State management ──────────────────────────────────────
  flutter_riverpod: ^2.6.1

  # ── Navigation ────────────────────────────────────────────
  go_router: ^14.6.1

  # ── Networking ────────────────────────────────────────────
  dio: ^5.8.0

  # ── Secure token storage ──────────────────────────────────
  flutter_secure_storage: ^9.2.2

  # ── Local preferences ─────────────────────────────────────
  shared_preferences: ^2.3.3

  # ── UI ────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1

  # ── Charts ────────────────────────────────────────────────
  fl_chart: ^0.69.0

  # ── Calendar ──────────────────────────────────────────────
  table_calendar: ^3.1.2

  # ── Real-time (Socket.io) ─────────────────────────────────
  socket_io_client: ^2.0.3+1

  # ── Firebase ───────────────────────────────────────────────
  firebase_core: ^3.8.1

  # ── Utilities ─────────────────────────────────────────────
  intl: ^0.19.0
  equatable: ^2.0.7
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
